<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1222" viewBox="0 0 1180 1222">
<rect x="0" y="0" width="1180" height="1222" fill="#FBFBF9"/>
<rect x="30.0" y="30.0" width="1120.0" height="112.0" rx="12" ry="12" fill="#42607F"/>
<text x="590.0" y="82.0" font-family="Liberation Sans, Arial, sans-serif" font-size="27" fill="#FFFFFF" text-anchor="middle" font-weight="700" >Cardiovascular Anomalies and Their Anesthetic Management in Patients with Cleft</text>
<text x="590.0" y="116.0" font-family="Liberation Sans, Arial, sans-serif" font-size="27" fill="#FFFFFF" text-anchor="middle" font-weight="700" >Lip and Palate</text>
<rect x="30.0" y="164.0" width="360.0" height="537.1" rx="12" ry="12" fill="#FFFFFF" stroke="#D9D4A6" stroke-width="1.6"/>
<rect x="30.0" y="164.0" width="360.0" height="46.0" rx="12" ry="12" fill="#8F8B45"/>
<rect x="30.0" y="198.0" width="360.0" height="12.0" rx="0" ry="0" fill="#8F8B45"/>
<text x="210.0" y="193.5" font-family="Liberation Sans, Arial, sans-serif" font-size="18.5" fill="#FFFFFF" text-anchor="middle" font-weight="700" >Introduction &amp; Pathophysiology</text>
<rect x="42.0" y="224.0" width="336.0" height="168.1" rx="9" ry="9" fill="#F3F1DF" stroke="#D9D4A6" stroke-width="1.1"/>
<rect x="42.0" y="224.0" width="5.0" height="168.1" rx="0" ry="0" fill="#8F8B45"/>
<text x="56.0" y="253.0" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#5F5C1E" text-anchor="start" font-weight="700" >Introduction</text>
<circle cx="60.0" cy="273.2" r="2.6" fill="#8F8B45"/>
<text x="74.0" y="278.0" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >Incidence: about 1 in 700 live births</text>
<circle cx="60.0" cy="297.6" r="2.6" fill="#8F8B45"/>
<text x="74.0" y="302.4" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >Coexisting malformations in up to 32.2% of</text>
<text x="74.0" y="322.8" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >cases</text>
<circle cx="60.0" cy="342.4" r="2.6" fill="#8F8B45"/>
<text x="74.0" y="347.2" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >Congenital heart disease (CHD) is the most</text>
<text x="74.0" y="367.6" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >common and a major source of morbidity</text>
<rect x="42.0" y="404.1" width="336.0" height="253.7" rx="9" ry="9" fill="#F3F1DF" stroke="#D9D4A6" stroke-width="1.1"/>
<rect x="42.0" y="404.1" width="5.0" height="253.7" rx="0" ry="0" fill="#8F8B45"/>
<text x="56.0" y="433.1" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#5F5C1E" text-anchor="start" font-weight="700" >Pathophysiology</text>
<circle cx="60.0" cy="453.3" r="2.6" fill="#8F8B45"/>
<text x="74.0" y="458.1" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >Shared embryology through neural crest</text>
<text x="74.0" y="478.5" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >cell pathways</text>
<circle cx="60.0" cy="498.1" r="2.6" fill="#8F8B45"/>
<text x="74.0" y="502.9" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >CHD is more common than in the general</text>
<text x="74.0" y="523.3" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >population (7.4% to 30.7%)</text>
<circle cx="60.0" cy="542.9" r="2.6" fill="#8F8B45"/>
<text x="74.0" y="547.7" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >Risk rises with palatal involvement: cleft</text>
<text x="74.0" y="568.1" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >palate or combined CLP more than isolated</text>
<text x="74.0" y="588.5" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >cleft lip</text>
<circle cx="60.0" cy="608.1" r="2.6" fill="#8F8B45"/>
<text x="74.0" y="612.9" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >Syndromic links, for example Pierre Robin</text>
<text x="74.0" y="633.3" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3D3B24" text-anchor="start" font-weight="400" >sequence and 22q11.2 deletion</text>
<rect x="410.0" y="164.0" width="360.0" height="537.1" rx="12" ry="12" fill="#FFFFFF" stroke="#AFD6D4" stroke-width="1.6"/>
<rect x="410.0" y="164.0" width="360.0" height="46.0" rx="12" ry="12" fill="#3F8E8E"/>
<rect x="410.0" y="198.0" width="360.0" height="12.0" rx="0" ry="0" fill="#3F8E8E"/>
<text x="590.0" y="184.0" font-family="Liberation Sans, Arial, sans-serif" font-size="15.5" fill="#FFFFFF" text-anchor="middle" font-weight="700" >Preoperative Assessment &amp;</text>
<text x="590.0" y="201.0" font-family="Liberation Sans, Arial, sans-serif" font-size="15.5" fill="#FFFFFF" text-anchor="middle" font-weight="700" >Optimization</text>
<rect x="422.0" y="224.0" width="336.0" height="143.7" rx="9" ry="9" fill="#E1F0EF" stroke="#AFD6D4" stroke-width="1.1"/>
<rect x="422.0" y="224.0" width="5.0" height="143.7" rx="0" ry="0" fill="#3F8E8E"/>
<text x="436.0" y="253.0" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#256463" text-anchor="start" font-weight="700" >Cardiac screening</text>
<circle cx="440.0" cy="273.2" r="2.6" fill="#3F8E8E"/>
<text x="454.0" y="278.0" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >Echocardiography is recommended for</text>
<text x="454.0" y="298.4" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >every patient</text>
<circle cx="440.0" cy="318.0" r="2.6" fill="#3F8E8E"/>
<text x="454.0" y="322.8" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >Pulse oximetry alone can miss VSD and</text>
<text x="454.0" y="343.2" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >ASD</text>
<rect x="422.0" y="379.7" width="336.0" height="143.7" rx="9" ry="9" fill="#E1F0EF" stroke="#AFD6D4" stroke-width="1.1"/>
<rect x="422.0" y="379.7" width="5.0" height="143.7" rx="0" ry="0" fill="#3F8E8E"/>
<text x="436.0" y="408.7" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#256463" text-anchor="start" font-weight="700" >Hematologic &amp; metabolic</text>
<circle cx="440.0" cy="428.9" r="2.6" fill="#3F8E8E"/>
<text x="454.0" y="433.7" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >Cyanotic CHD: check hemoglobin and</text>
<text x="454.0" y="454.1" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >coagulation</text>
<circle cx="440.0" cy="473.7" r="2.6" fill="#3F8E8E"/>
<text x="454.0" y="478.5" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >Bridge anticoagulation when bleeding risk</text>
<text x="454.0" y="498.9" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >is a concern</text>
<rect x="422.0" y="535.4" width="336.0" height="143.7" rx="9" ry="9" fill="#E1F0EF" stroke="#AFD6D4" stroke-width="1.1"/>
<rect x="422.0" y="535.4" width="5.0" height="143.7" rx="0" ry="0" fill="#3F8E8E"/>
<text x="436.0" y="564.4" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#256463" text-anchor="start" font-weight="700" >Fasting</text>
<circle cx="440.0" cy="584.6" r="2.6" fill="#3F8E8E"/>
<text x="454.0" y="589.4" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >Avoid prolonged fasting in cyanotic lesions,</text>
<text x="454.0" y="609.8" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >which increases shunting and clot risk</text>
<circle cx="440.0" cy="629.4" r="2.6" fill="#3F8E8E"/>
<text x="454.0" y="634.2" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >Clear liquids up to 1 to 2 hours before</text>
<text x="454.0" y="654.6" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#243B3B" text-anchor="start" font-weight="400" >surgery</text>
<rect x="790.0" y="164.0" width="360.0" height="537.1" rx="12" ry="12" fill="#FFFFFF" stroke="#E3CFA0" stroke-width="1.6"/>
<rect x="790.0" y="164.0" width="360.0" height="46.0" rx="12" ry="12" fill="#B08A3C"/>
<rect x="790.0" y="198.0" width="360.0" height="12.0" rx="0" ry="0" fill="#B08A3C"/>
<text x="970.0" y="193.5" font-family="Liberation Sans, Arial, sans-serif" font-size="18.5" fill="#FFFFFF" text-anchor="middle" font-weight="700" >Intraoperative Anesthetic Management</text>
<rect x="802.0" y="224.0" width="336.0" height="212.9" rx="9" ry="9" fill="#F6EEDC" stroke="#E3CFA0" stroke-width="1.1"/>
<rect x="802.0" y="224.0" width="5.0" height="212.9" rx="0" ry="0" fill="#B08A3C"/>
<text x="816.0" y="253.0" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#7A561B" text-anchor="start" font-weight="700" >Hemodynamic control</text>
<circle cx="820.0" cy="273.2" r="2.6" fill="#B08A3C"/>
<text x="834.0" y="278.0" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >Main goal: keep the circulation stable and</text>
<text x="834.0" y="298.4" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >prevent abnormal shunting</text>
<circle cx="820.0" cy="318.0" r="2.6" fill="#B08A3C"/>
<text x="834.0" y="322.8" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >Cyanotic lesions such as unrepaired TOF:</text>
<text x="834.0" y="343.2" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >maintain SVR and avoid raising PVR</text>
<circle cx="820.0" cy="362.8" r="2.6" fill="#B08A3C"/>
<text x="834.0" y="367.6" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >Ketamine is a useful induction agent</text>
<circle cx="820.0" cy="387.2" r="2.6" fill="#B08A3C"/>
<text x="834.0" y="392.0" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >After a Glenn palliation: support filling with</text>
<text x="834.0" y="412.4" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >volume and alpha-1 agonists</text>
<rect x="802.0" y="448.9" width="336.0" height="102.9" rx="9" ry="9" fill="#F6EEDC" stroke="#E3CFA0" stroke-width="1.1"/>
<rect x="802.0" y="448.9" width="5.0" height="102.9" rx="0" ry="0" fill="#B08A3C"/>
<text x="816.0" y="477.9" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#7A561B" text-anchor="start" font-weight="700" >Airway &amp; ventilation</text>
<circle cx="820.0" cy="498.1" r="2.6" fill="#B08A3C"/>
<text x="834.0" y="502.9" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >Videolaryngoscopy is a sensible first choice</text>
<circle cx="820.0" cy="522.5" r="2.6" fill="#B08A3C"/>
<text x="834.0" y="527.3" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >Preoxygenate with high-flow nasal oxygen</text>
<rect x="802.0" y="563.8" width="336.0" height="123.3" rx="9" ry="9" fill="#F6EEDC" stroke="#E3CFA0" stroke-width="1.1"/>
<rect x="802.0" y="563.8" width="5.0" height="123.3" rx="0" ry="0" fill="#B08A3C"/>
<text x="816.0" y="592.8" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#7A561B" text-anchor="start" font-weight="700" >Multimodal analgesia</text>
<circle cx="820.0" cy="613.0" r="2.6" fill="#B08A3C"/>
<text x="834.0" y="617.8" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >Favor opioid-sparing techniques</text>
<circle cx="820.0" cy="637.4" r="2.6" fill="#B08A3C"/>
<text x="834.0" y="642.2" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >Regional blocks such as the</text>
<text x="834.0" y="662.6" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#3B3320" text-anchor="start" font-weight="400" >suprazygomatic maxillary nerve block</text>
<rect x="30.0" y="725.1" width="550.0" height="365.0" rx="12" ry="12" fill="#FFFFFF" stroke="#B7CADD" stroke-width="1.6"/>
<rect x="30.0" y="725.1" width="550.0" height="46.0" rx="12" ry="12" fill="#42607F"/>
<rect x="30.0" y="759.1" width="550.0" height="12.0" rx="0" ry="0" fill="#42607F"/>
<text x="305.0" y="754.6" font-family="Liberation Sans, Arial, sans-serif" font-size="18.5" fill="#FFFFFF" text-anchor="middle" font-weight="700" >Monitoring &amp; Critical Events</text>
<rect x="42.0" y="785.1" width="526.0" height="102.9" rx="9" ry="9" fill="#E5ECF3" stroke="#B7CADD" stroke-width="1.1"/>
<rect x="42.0" y="785.1" width="5.0" height="102.9" rx="0" ry="0" fill="#42607F"/>
<text x="56.0" y="814.1" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#2C4864" text-anchor="start" font-weight="700" >Monitoring &amp; ICU admission</text>
<circle cx="60.0" cy="834.3" r="2.6" fill="#42607F"/>
<text x="74.0" y="839.1" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Greater complexity means longer ICU and hospital stays</text>
<circle cx="60.0" cy="858.7" r="2.6" fill="#42607F"/>
<text x="74.0" y="863.5" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Admit high-risk patients directly to the ICU</text>
<rect x="42.0" y="900.0" width="526.0" height="127.3" rx="9" ry="9" fill="#E5ECF3" stroke="#B7CADD" stroke-width="1.1"/>
<rect x="42.0" y="900.0" width="5.0" height="127.3" rx="0" ry="0" fill="#42607F"/>
<text x="56.0" y="929.0" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#2C4864" text-anchor="start" font-weight="700" >Hypercyanotic (Tet) spells in TOF: emergency steps</text>
<circle cx="60.0" cy="949.2" r="2.6" fill="#42607F"/>
<text x="74.0" y="954.0" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >100% oxygen</text>
<circle cx="60.0" cy="973.6" r="2.6" fill="#42607F"/>
<text x="74.0" y="978.4" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Knee-to-chest position</text>
<circle cx="60.0" cy="998.0" r="2.6" fill="#42607F"/>
<text x="74.0" y="1002.8" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Fluids and vasopressors</text>
<rect x="600.0" y="725.1" width="550.0" height="365.0" rx="12" ry="12" fill="#FFFFFF" stroke="#B7CADD" stroke-width="1.6"/>
<rect x="600.0" y="725.1" width="550.0" height="46.0" rx="12" ry="12" fill="#42607F"/>
<rect x="600.0" y="759.1" width="550.0" height="12.0" rx="0" ry="0" fill="#42607F"/>
<text x="875.0" y="754.6" font-family="Liberation Sans, Arial, sans-serif" font-size="18.5" fill="#FFFFFF" text-anchor="middle" font-weight="700" >Postoperative Care &amp; Complication Management</text>
<rect x="612.0" y="785.1" width="526.0" height="102.9" rx="9" ry="9" fill="#E5ECF3" stroke="#B7CADD" stroke-width="1.1"/>
<rect x="612.0" y="785.1" width="5.0" height="102.9" rx="0" ry="0" fill="#42607F"/>
<text x="626.0" y="814.1" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#2C4864" text-anchor="start" font-weight="700" >Feeding protocols</text>
<circle cx="630.0" cy="834.3" r="2.6" fill="#42607F"/>
<text x="644.0" y="839.1" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Start feeding early, following ERAS principles</text>
<circle cx="630.0" cy="858.7" r="2.6" fill="#42607F"/>
<text x="644.0" y="863.5" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Use a safe, well-supported feeding position</text>
<rect x="612.0" y="900.0" width="526.0" height="176.1" rx="9" ry="9" fill="#E5ECF3" stroke="#B7CADD" stroke-width="1.1"/>
<rect x="612.0" y="900.0" width="5.0" height="176.1" rx="0" ry="0" fill="#42607F"/>
<text x="626.0" y="929.0" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#2C4864" text-anchor="start" font-weight="700" >Feeding tips for the infant</text>
<circle cx="630.0" cy="949.2" r="2.6" fill="#42607F"/>
<text x="644.0" y="954.0" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Feed slowly with the baby semi-upright</text>
<circle cx="630.0" cy="973.6" r="2.6" fill="#42607F"/>
<text x="644.0" y="978.4" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Let the baby latch firmly and take its time</text>
<circle cx="630.0" cy="998.0" r="2.6" fill="#42607F"/>
<text x="644.0" y="1002.8" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Pause often during the feed</text>
<circle cx="630.0" cy="1022.4" r="2.6" fill="#42607F"/>
<text x="644.0" y="1027.2" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Burp regularly</text>
<circle cx="630.0" cy="1046.8" r="2.6" fill="#42607F"/>
<text x="644.0" y="1051.6" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#26313B" text-anchor="start" font-weight="400" >Stop if the baby starts coughing</text>
<rect x="30.0" y="1112.1" width="1120.0" height="80.0" rx="10" ry="10" fill="#F2F1EC" stroke="#D8D6CE" stroke-width="1.1"/>
<text x="46.0" y="1138.1" font-family="Liberation Sans, Arial, sans-serif" font-size="13.5" fill="#54524B" text-anchor="start" font-weight="400" >Selected references: 1. Mohan et al., 2025; 2. Kumar et al., 2024; 3. Flynn et al., 2026; 4. Munabi et al., 2017; 5. Fujii et al., 2023; 6. Zhang et al., 2025; 7. Esfahanian et al., 2022; 8.</text>
<text x="46.0" y="1158.1" font-family="Liberation Sans, Arial, sans-serif" font-size="13.5" fill="#54524B" text-anchor="start" font-weight="400" >Edetalen et al., 2023; 9. Toubat et al., 2021; 10. Pascal et al., 2022; 11. Leite et al., 2018; 12. Stoll et al., 2022</text>
<text x="1134.0" y="1182.1" font-family="Liberation Sans, Arial, sans-serif" font-size="13" fill="#6E6C64" text-anchor="end" font-weight="400" font-style="italic">Feeding guidance adapted from published protocols.</text>
</svg>